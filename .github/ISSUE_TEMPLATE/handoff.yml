name: Handoff
description: Track handoff preparation or handoff challenge feedback.
title: "[Handoff] "
labels: ["handoff"]
body:
  - type: input
    id: source_repo
    attributes:
      label: Source repo
      placeholder: team repo being handed off
  - type: textarea
    id: run
    attributes:
      label: How to run
  - type: textarea
    id: important_files
    attributes:
      label: Important files
  - type: textarea
    id: task
    attributes:
      label: Handoff task
  - type: textarea
    id: unclear
    attributes:
      label: What was unclear?
  - type: textarea
    id: feedback
    attributes:
      label: Feedback to original team
