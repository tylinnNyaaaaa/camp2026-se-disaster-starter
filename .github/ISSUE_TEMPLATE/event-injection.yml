name: Event injection
description: Track the 15:35 incoming dirty data handling task.
title: "[Event Injection] "
labels: ["event-injection"]
body:
  - type: input
    id: event_path
    attributes:
      label: Incoming data path
      placeholder: events/event-1535/incoming-data.json
  - type: textarea
    id: mismatch
    attributes:
      label: Schema mismatch
      description: What does not match the current internal schema?
  - type: dropdown
    id: strategy
    attributes:
      label: Decision strategy
      options:
        - adapter
        - family schema extension
        - mark needs_review
        - reject
        - not decided yet
  - type: textarea
    id: decision
    attributes:
      label: Decision rationale
  - type: textarea
    id: docs
    attributes:
      label: Required docs update
      description: Which docs must be updated?
  - type: textarea
    id: tests
    attributes:
      label: Required test or validation
