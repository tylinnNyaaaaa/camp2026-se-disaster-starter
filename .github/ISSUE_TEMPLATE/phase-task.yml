name: Phase task
description: Track one classroom phase task.
title: "[Phase] "
labels: ["phase-task"]
body:
  - type: input
    id: phase
    attributes:
      label: Current phase
      placeholder: Phase 0 / SDD-lite / Build Sprint 1
  - type: textarea
    id: sources
    attributes:
      label: Source materials
      description: Files, PRs, issues, or slides students should read first.
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: What students should do now.
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What must be produced before this phase ends.
  - type: textarea
    id: stop
    attributes:
      label: Stop condition
      description: When should the team stop adding features and switch to documentation or sharing?
